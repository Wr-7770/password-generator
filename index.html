<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 المولد الأسطوري | كلمات مرور خارقة</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100% );
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            margin-bottom: 25px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #password-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4rem;
            color: var(--text-main);
            word-break: break-all;
            padding-left: 40px;
        }

        .copy-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .strength-meter {
            height: 6px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        #strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.5s ease;
        }

        .settings {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .length-label {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            color: var(--text-dim);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .checkbox-item input {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        footer {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .social-links a {
            color: var(--text-dim);
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from { bottom: -50px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👑 المولد الأسطوري</h1>
            <p style="color: var(--text-dim)">أنشئ حصنك الرقمي في ثوانٍ 🛡️</p>
        </header>

        <div class="result-container">
            <div id="password-display">اضغط توليد...</div>
            <button class="copy-btn" id="copy-btn" title="نسخ">
                <i class="fas fa-copy"></i>
            </button>
        </div>

        <div class="strength-meter">
            <div id="strength-bar"></div>
        </div>
        <p id="strength-text" style="font-size: 0.8rem; margin-top: 5px; text-align: left; color: var(--text-dim)"></p>

        <div class="settings">
            <div>
                <div class="length-label">
                    <span>طول كلمة المرور</span>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length-slider" min="8" max="50" value="16">
            </div>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="uppercase" checked>
                    <span>أحرف كبيرة</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="lowercase" checked>
                    <span>أحرف صغيرة</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="numbers" checked>
                    <span>أرقام</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="symbols" checked>
                    <span>رموز</span>
                </label>
            </div>
        </div>

        <button class="generate-btn" id="generate-btn">
            <i class="fas fa-magic"></i> توليد كلمة مرور أسطورية
        </button>

        <footer>
            <div class="social-links">
                <a href="https://github.com/Wr-7770" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/yousef-mohamed-ahmed-24795435a" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="mailto:nerva98134@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-dim )">صُنع بكل 💜 بواسطة يوسف محمد</p>
        </footer>
    </div>

    <div id="toast" class="toast">تم النسخ بنجاح! 🚀</div>

    <script>
        const display = document.getElementById('password-display');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        const toast = document.getElementById('toast');

        const keys = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        const generatePassword = () => {
            let charset = '';
            if (document.getElementById('uppercase').checked) charset += keys.uppercase;
            if (document.getElementById('lowercase').checked) charset += keys.lowercase;
            if (document.getElementById('numbers').checked) charset += keys.numbers;
            if (document.getElementById('symbols').checked) charset += keys.symbols;

            if (charset === '') {
                display.innerText = 'اختر خياراً واحداً!';
                return;
            }

            let password = '';
            for (let i = 0; i < lengthSlider.value; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            display.innerText = password;
            updateStrength(password);
        };

        const updateStrength = (pwd) => {
            let strength = 0;
            if (pwd.length > 12) strength += 40;
            if (/[A-Z]/.test(pwd)) strength += 20;
            if (/[0-9]/.test(pwd)) strength += 20;
            if (/[^A-Za-z0-9]/.test(pwd)) strength += 20;

            strengthBar.style.width = strength + '%';
            
            if (strength < 50) {
                strengthBar.style.backgroundColor = '#ef4444';
                strengthText.innerText = 'ضعيفة ⚠️';
            } else if (strength < 80) {
                strengthBar.style.backgroundColor = '#f59e0b';
                strengthText.innerText = 'متوسطة 🛡️';
            } else {
                strengthBar.style.backgroundColor = '#10b981';
                strengthText.innerText = 'أسطورية 👑';
            }
        };

        lengthSlider.addEventListener('input', (e) => {
            lengthVal.innerText = e.target.value;
            generatePassword();
        });

        generateBtn.addEventListener('click', generatePassword);

        copyBtn.addEventListener('click', () => {
            const pwd = display.innerText;
            if (pwd === 'اضغط توليد...' || pwd === 'اختر خياراً واحداً!') return;
            
            navigator.clipboard.writeText(pwd).then(() => {
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        });

        window.onload = generatePassword;
    </script>
</body>
</html>
