<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultGen | Professional Password Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --border-color: #262626;
            --accent-color: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color );
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .result-box {
            background: #000000;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        #password-display {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            color: var(--text-primary);
            word-break: break-all;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.3rem;
            transition: color 0.2s;
            padding: 5px;
        }

        .action-btn:hover {
            color: var(--text-primary);
        }

        .strength-indicator {
            height: 4px;
            width: 100%;
            background: #262626;
            border-radius: 2px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        #strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        /* تحسين شريط التمرير */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #262626;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #000;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* تحسين مربعات الاختيار */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            position: relative;
        }

        .option-item:hover {
            background: #222222;
            border-color: #444;
        }

        .option-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #444;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .option-item input[type="checkbox"]:checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .option-item input[type="checkbox"]:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #000;
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 35px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .generate-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 45px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: var(--text-secondary);
            font-size: 1.4rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        .footer-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #000000;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VaultGen</h1>
            <p class="subtitle">توليد كلمات مرور بمعايير أمنية عالمية</p>
        </header>

        <div class="result-box">
            <div id="password-display">********</div>
            <button class="action-btn" id="copy-btn" title="نسخ">
                <i class="far fa-copy"></i>
            </button>
        </div>

        <div class="strength-indicator">
            <div id="strength-bar"></div>
        </div>

        <div class="settings-group">
            <div>
                <div class="label-row">
                    <span>طول كلمة المرور</span>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length-slider" min="8" max="64" value="16">
            </div>

            <div class="options-grid">
                <label class="option-item">
                    <input type="checkbox" id="uppercase" checked>
                    <span>أحرف كبيرة</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="lowercase" checked>
                    <span>أحرف صغيرة</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="numbers" checked>
                    <span>أرقام</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="symbols" checked>
                    <span>رموز</span>
                </label>
            </div>
        </div>

        <button class="generate-btn" id="generate-btn">توليد كلمة المرور</button>

        <footer>
            <div class="footer-links">
                <a href="https://github.com/Wr-7770" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/yousef-mohamed-ahmed-24795435a" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="mailto:nerva98134@gmail.com"><i class="far fa-envelope"></i></a>
            </div>
            <div class="footer-text">Made by Y796</div>
        </footer>
    </div>

    <div id="toast" class="toast">تم النسخ للحافظة</div>

    <script>
        const display = document.getElementById('password-display' );
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const strengthBar = document.getElementById('strength-bar');
        const toast = document.getElementById('toast');

        const config = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        function generate() {
            let chars = '';
            if (document.getElementById('uppercase').checked) chars += config.uppercase;
            if (document.getElementById('lowercase').checked) chars += config.lowercase;
            if (document.getElementById('numbers').checked) chars += config.numbers;
            if (document.getElementById('symbols').checked) chars += config.symbols;

            if (!chars) {
                display.innerText = 'حدد خياراً';
                return;
            }

            let pwd = '';
            const len = lengthSlider.value;
            for (let i = 0; i < len; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            display.innerText = pwd;
            updateStrength(pwd);
        }

        function updateStrength(pwd) {
            let score = 0;
            if (pwd.length >= 12) score += 25;
            if (pwd.length >= 16) score += 15;
            if (/[A-Z]/.test(pwd)) score += 20;
            if (/[0-9]/.test(pwd)) score += 20;
            if (/[^A-Za-z0-9]/.test(pwd)) score += 20;

            strengthBar.style.width = score + '%';
            
            if (score < 50) strengthBar.style.backgroundColor = '#ff4444';
            else if (score < 80) strengthBar.style.backgroundColor = '#ffbb33';
            else strengthBar.style.backgroundColor = '#00C851';
        }

        lengthSlider.addEventListener('input', (e) => {
            lengthVal.innerText = e.target.value;
            generate();
        });

        generateBtn.addEventListener('click', generate);

        copyBtn.addEventListener('click', () => {
            const pwd = display.innerText;
            if (pwd === '********' || pwd === 'حدد خياراً') return;
            
            navigator.clipboard.writeText(pwd).then(() => {
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        });

        window.onload = generate;
    </script>
</body>
</html>
